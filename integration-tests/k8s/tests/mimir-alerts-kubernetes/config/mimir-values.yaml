# required for write/read paths and alertmanager-config checks.
ingester:
  replicas: 1
querier:
  replicas: 1
query_scheduler:
  enabled: false
store_gateway:
  enabled: false
compactor:
  enabled: false
admin_api:
  enabled: false
gateway:
  enabled: false
